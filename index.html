<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvas-audio-annotator</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="landing-page">
    <main class="landing-card">
      <p class="eyebrow">canvas-audio-annotator</p>
      <h1>Static audio annotation player for Canvas embeds</h1>
      <p class="landing-copy">
        Open the standalone player with a track query parameter.
      </p>
      <div class="landing-links">
        <a class="landing-link" href="./player.html?track=piece1">Open sample track: piece1</a>
        <a class="landing-link" href="./player.html?track=piece2">Open sample track: piece2</a>
      </div>
      <p class="landing-copy subtle">
        You can also pass a published Google Sheet URL with
        <code>?track=piece1&amp;sheet=...</code>.
      </p>
    </main>
  </body>
</html>
